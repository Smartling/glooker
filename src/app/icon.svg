<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Hexagonal gem / crystal -->
  <rect rx="28" ry="28" width="128" height="128" fill="#111827"/>
  <!-- Outer hex -->
  <polygon points="64,16 108,38 108,90 64,112 20,90 20,38" fill="none" stroke="#818cf8" stroke-width="4"/>
  <!-- Inner facet lines -->
  <line x1="64" y1="16" x2="64" y2="64" stroke="#6366f1" stroke-width="2.5"/>
  <line x1="108" y1="38" x2="64" y2="64" stroke="#6366f1" stroke-width="2.5"/>
  <line x1="20" y1="38" x2="64" y2="64" stroke="#6366f1" stroke-width="2.5"/>
  <!-- Bottom fill for depth -->
  <polygon points="64,64 108,90 64,112 20,90" fill="#4338ca" opacity="0.3"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="5" fill="#c7d2fe"/>
</svg>
