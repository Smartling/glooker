version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Database — use MySQL from the mysql service
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: glooker
      DB_PASSWORD: glooker
      DB_NAME: glooker

      # GitHub
      GITHUB_TOKEN: ${GITHUB_TOKEN}

      # LLM Provider: openai, anthropic, smartling, or openai-compatible
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_CONCURRENCY: ${LLM_CONCURRENCY:-5}

      # Smartling (only needed if LLM_PROVIDER=smartling)
      SMARTLING_BASE_URL: ${SMARTLING_BASE_URL:-}
      SMARTLING_ACCOUNT_UID: ${SMARTLING_ACCOUNT_UID:-}
      SMARTLING_USER_IDENTIFIER: ${SMARTLING_USER_IDENTIFIER:-}
      SMARTLING_USER_SECRET: ${SMARTLING_USER_SECRET:-}

      # Jira (optional)
      JIRA_ENABLED: ${JIRA_ENABLED:-}
      JIRA_HOST: ${JIRA_HOST:-}
      JIRA_USERNAME: ${JIRA_USERNAME:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_API_VERSION: ${JIRA_API_VERSION:-3}
      JIRA_PROJECTS: ${JIRA_PROJECTS:-}
      JIRA_STORY_POINTS_FIELDS: ${JIRA_STORY_POINTS_FIELDS:-}
      JIRA_PROJECTS_JQL: ${JIRA_PROJECTS_JQL:-}

      # Auth (optional — for ALB OIDC deployments)
      AUTH_ENABLED: ${AUTH_ENABLED:-}
      AUTH_HEADER: ${AUTH_HEADER:-x-amzn-oidc-data}
      AUTH_ADMIN_GROUP: ${AUTH_ADMIN_GROUP:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: glooker
      MYSQL_USER: glooker
      MYSQL_PASSWORD: glooker
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
